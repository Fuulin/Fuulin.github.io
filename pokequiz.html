  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

lay: swap;\n  src: url(\"b54b75ee-9b25-434f-b025-0e828f6c4229\") format('woff2');\n  unicode-range: U+0307-0308, U+0590-05FF, U+200C-2010, U+20AA, U+25CC, U+FB1D-FB4F;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Fredoka';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"a3b41ce2-3eb3-4c85-8c9a-26e70cd5a53a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Fredoka';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"7fd6887b-3939-489a-af66-a4cc946d9fe3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    /* Cheerful primary palette */\n    --coral:   #FF6B6B;\n    --coral-d: #E94B4B;\n    --sunny:   #FFD93D;\n    --sunny-d: #F0B90B;\n    --sky:     #4DABF7;\n    --sky-d:   #2E8FE0;\n    --mint:    #51CF66;\n    --mint-d:  #2FB347;\n    --lilac:   #B197FC;\n    --lilac-d: #8B6FE8;\n    --peach:   #FFB088;\n    --rose:    #FF87C3;\n    --indigo:  #5C7CFA;\n\n    /* Neutrals */\n    --ink:     #2A2F4A;\n    --ink-soft:#4B527A;\n    --muted:   #8A92B5;\n    --paper:   #FFFCF5;\n    --paper-2: #FFFFFF;\n    --cloud:   #EEF6FF;\n    --border:  #E8E3F0;\n\n    /* Shadows — chunky cartoon style */\n    --shadow-card: 0 10px 0 -2px rgba(45, 47, 74, 0.12), 0 18px 40px -10px rgba(60, 90, 160, 0.35);\n    --shadow-btn:  0 5px 0 0 var(--btn-shadow-color, #c44141);\n    --shadow-soft: 0 6px 18px -6px rgba(45, 47, 74, 0.25);\n\n    --radius:   24px;\n    --radius-s: 16px;\n    --radius-xs: 12px;\n  }\n\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; padding: 0; }\n  html { -webkit-text-size-adjust: 100%; }\n  body {\n    font-family: \"Fredoka\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    font-weight: 500;\n    color: var(--ink);\n    min-height: 100vh;\n    min-height: 100dvh;\n    background:\n      radial-gradient(1200px 600px at 10% -10%, #FFE7C2 0%, transparent 60%),\n      radial-gradient(1000px 500px at 90% 0%, #DDF0FF 0%, transparent 55%),\n      radial-gradient(800px 600px at 50% 110%, #FFE0F0 0%, transparent 60%),\n      linear-gradient(180deg, #FFF5DC 0%, #DCEEFF 100%);\n    background-attachment: fixed;\n    overflow-x: hidden;\n    padding: 20px 16px 80px;\n    display: flex;\n    justify-content: center;\n    align-items: flex-start;\n    line-height: 1.35;\n  }\n\n  /* Decorative floating dots in the background */\n  body::before, body::after {\n    content: \"\";\n    position: fixed;\n    pointer-events: none;\n    inset: 0;\n    z-index: 0;\n    background-image:\n      radial-gradient(circle at 8% 14%, rgba(255, 217, 61, 0.55) 0, rgba(255, 217, 61, 0.55) 6px, transparent 7px),\n      radial-gradient(circle at 92% 22%, rgba(77, 171, 247, 0.45) 0, rgba(77, 171, 247, 0.45) 8px, transparent 9px),\n      radial-gradient(circle at 18% 88%, rgba(255, 135, 195, 0.45) 0, rgba(255, 135, 195, 0.45) 7px, transparent 8px),\n      radial-gradient(circle at 82% 86%, rgba(81, 207, 102, 0.45) 0, rgba(81, 207, 102, 0.45) 9px, transparent 10px),\n      radial-gradient(circle at 50% 8%, rgba(177, 151, 252, 0.4) 0, rgba(177, 151, 252, 0.4) 5px, transparent 6px),\n      radial-gradient(circle at 96% 56%, rgba(255, 176, 136, 0.45) 0, rgba(255, 176, 136, 0.45) 8px, transparent 9px);\n  }\n  body::after {\n    background-image:\n      radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.7) 0, rgba(255, 255, 255, 0.7) 14px, transparent 15px),\n      radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.7) 0, rgba(255, 255, 255, 0.7) 18px, transparent 19px),\n      radial-gradient(circle at 14% 60%, rgba(255, 255, 255, 0.6) 0, rgba(255, 255, 255, 0.6) 10px, transparent 11px);\n    animation: floatClouds 24s ease-in-out infinite alternate;\n  }\n  @keyframes floatClouds {\n    0%   { transform: translate(0, 0); }\n    100% { transform: translate(20px, -10px); }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    body::after { animation: none; }\n  }\n\n  .app {\n    width: 100%;\n    max-width: 900px;\n    position: relative;\n    z-index: 1;\n  }\n\n  /* ============== HEADER / WORDMARK ============== */\n  .header {\n    text-align: center;\n    margin-bottom: 18px;\n    position: relative;\n  }\n  .wordmark {\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    position: relative;\n  }\n  .wordmark .badge {\n    width: 56px;\n    height: 56px;\n    border-radius: 50%;\n    background: linear-gradient(180deg, var(--sunny) 0 50%, var(--coral) 50% 100%);\n    border: 4px solid var(--ink);\n    position: relative;\n    flex: 0 0 auto;\n    box-shadow: 0 5px 0 0 rgba(45, 47, 74, 0.15);\n    animation: bob 3s ease-in-out infinite;\n  }\n  .wordmark .badge::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    border-radius: 50%;\n    border-top: 4px solid transparent;\n    border-bottom: 4px solid transparent;\n    box-shadow: inset 0 0 0 4px transparent;\n  }\n  .wordmark .badge::after {\n    /* horizontal stripe */\n    content: \"\";\n    position: absolute;\n    left: -4px; right: -4px;\n    top: 50%; height: 4px;\n    background: var(--ink);\n    transform: translateY(-2px);\n  }\n  .wordmark .badge .dot {\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 18px; height: 18px;\n    margin: -9px 0 0 -9px;\n    border-radius: 50%;\n    background: white;\n    border: 4px solid var(--ink);\n    z-index: 2;\n  }\n  @keyframes bob {\n    0%, 100% { transform: translateY(0) rotate(-6deg); }\n    50%      { transform: translateY(-6px) rotate(6deg); }\n  }\n  .wordmark h1 {\n    margin: 0;\n    font-family: \"Fredoka\", sans-serif;\n    font-weight: 700;\n    font-size: clamp(32px, 6vw, 52px);\n    letter-spacing: -0.5px;\n    color: var(--ink);\n    text-shadow:\n      3px 3px 0 var(--sunny),\n      3px 3px 0 1px var(--ink);\n    line-height: 1;\n  }\n  .header .tagline {\n    margin: 14px 0 0;\n    font-weight: 600;\n    font-size: 16px;\n    color: var(--ink-soft);\n  }\n  .header .tagline .pill {\n    display: inline-block;\n    padding: 4px 12px;\n    background: white;\n    border: 2px solid var(--ink);\n    border-radius: 999px;\n    box-shadow: 0 3px 0 0 rgba(45,47,74,0.15);\n    margin: 0 3px;\n  }\n\n  /* ============== CARD ============== */\n  .card {\n    background: var(--paper-2);\n    border-radius: var(--radius);\n    padding: 22px;\n    border: 3px solid var(--ink);\n    box-shadow: var(--shadow-card);\n    position: relative;\n  }\n  .card::before {\n    /* notebook-tape decoration */\n    content: \"\";\n    position: absolute;\n    top: -10px;\n    left: 50%;\n    transform: translateX(-50%) rotate(-2deg);\n    width: 90px;\n    height: 20px;\n    background: var(--sunny);\n    border: 2px solid var(--ink);\n    border-radius: 4px;\n    box-shadow: 0 2px 0 0 rgba(45,47,74,0.2);\n  }\n\n  .screen { display: none; }\n  .screen.active { display: block; animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1); }\n  @keyframes popIn {\n    from { opacity: 0; transform: translateY(14px) scale(0.97); }\n    to   { opacity: 1; transform: translateY(0) scale(1); }\n  }\n\n  /* ============== SECTIONS ============== */\n  .section { margin-bottom: 22px; }\n  .section h2 {\n    margin: 0 0 12px;\n    font-size: 18px;\n    font-weight: 700;\n    color: var(--ink);\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .section h2 .num {\n    width: 28px; height: 28px;\n    background: var(--sunny);\n    border: 2px solid var(--ink);\n    border-radius: 50%;\n    display: inline-flex; align-items: center; justify-content: center;\n    font-size: 14px; font-weight: 700;\n    box-shadow: 0 2px 0 0 var(--sunny-d);\n    flex: 0 0 auto;\n  }\n  .section h2 .hint {\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--muted);\n    margin-left: auto;\n  }\n\n  /* ============== GENERATION CARDS ============== */\n  .gen-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));\n    gap: 10px;\n  }\n  .gen-card {\n    --bg: var(--cloud);\n    --c: var(--sky);\n    display: flex; align-items: center; gap: 10px;\n    background: white;\n    border: 3px solid var(--ink);\n    border-radius: var(--radius-s);\n    padding: 10px 12px;\n    cursor: pointer;\n    transition: transform 0.12s, background 0.12s, box-shadow 0.12s;\n    box-shadow: 0 3px 0 0 var(--ink);\n    user-select: none;\n    position: relative;\n    overflow: hidden;\n  }\n  .gen-card:hover { transform: translateY(-1px); box-shadow: 0 4px 0 0 var(--ink); }\n  .gen-card:active { transform: translateY(2px); box-shadow: 0 1px 0 0 var(--ink); }\n  .gen-card.checked {\n    background: var(--bg);\n    box-shadow: 0 3px 0 0 var(--ink), inset 0 0 0 3px var(--c);\n  }\n  .gen-card input { display: none; }\n  .gen-card .chip {\n    width: 36px; height: 36px;\n    flex: 0 0 auto;\n    border-radius: 12px;\n    background: var(--c);\n    color: white;\n    display: inline-flex; align-items: center; justify-content: center;\n    font-weight: 700; font-size: 13px;\n    border: 2px solid var(--ink);\n    box-shadow: 0 2px 0 0 var(--ink);\n  }\n  .gen-card .info { flex: 1; min-width: 0; }\n  .gen-card .name { font-weight: 700; font-size: 15px; color: var(--ink); }\n  .gen-card .sub { font-size: 11px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n  .gen-card .tick {\n    width: 22px; height: 22px;\n    border-radius: 50%;\n    background: white;\n    border: 2px solid var(--ink);\n    flex: 0 0 auto;\n    display: inline-flex; align-items: center; justify-content: center;\n    color: transparent;\n    font-weight: 800; font-size: 14px;\n    transition: background 0.15s, color 0.15s;\n  }\n  .gen-card.checked .tick { background: var(--c); color: white; }\n\n  /* Generation accent colors */\n  .gen-1 { --c: #FF6B6B; --bg: #FFE5E5; }\n  .gen-2 { --c: #F0B90B; --bg: #FFF5CC; }\n  .gen-3 { --c: #51CF66; --bg: #DDF7E0; }\n  .gen-4 { --c: #4DABF7; --bg: #DDEEFC; }\n  .gen-5 { --c: #5C7CFA; --bg: #E1E7FE; }\n  .gen-6 { --c: #B197FC; --bg: #ECE3FF; }\n  .gen-7 { --c: #FF87C3; --bg: #FFE0EE; }\n  .gen-8 { --c: #8B6FE8; --bg: #E6DDFB; }\n  .gen-9 { --c: #FF8E5C; --bg: #FFE2D2; }\n\n  .gen-quick {\n    display: flex; gap: 6px; flex-wrap: wrap;\n    margin-bottom: 12px;\n  }\n  .pill-btn {\n    background: white;\n    border: 2px solid var(--ink);\n    border-radius: 999px;\n    padding: 5px 12px;\n    font-family: inherit;\n    font-size: 12px;\n    font-weight: 600;\n    color: var(--ink);\n    cursor: pointer;\n    box-shadow: 0 2px 0 0 var(--ink);\n    transition: transform 0.1s, box-shadow 0.1s;\n  }\n  .pill-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 0 0 var(--ink); background: var(--sunny); }\n  .pill-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 0 var(--ink); }\n\n  /* ============== OPTION CARDS (difficulty / mode / type / count) ============== */\n  .option-grid {\n    display: grid;\n    gap: 10px;\n  }\n  .option-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }\n  .option-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }\n  .option-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }\n\n  .opt-card {\n    --c: var(--sky);\n    --bg: var(--cloud);\n    background: white;\n    border: 3px solid var(--ink);\n    border-radius: var(--radius-s);\n    padding: 12px 10px;\n    cursor: pointer;\n    text-align: center;\n    transition: transform 0.12s, background 0.12s, box-shadow 0.12s;\n    box-shadow: 0 3px 0 0 var(--ink);\n    position: relative;\n    user-select: none;\n    overflow: hidden;\n    min-height: 100px;\n    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;\n  }\n  .opt-card input { display: none; }\n  .opt-card:hover { transform: translateY(-2px) rotate(-1deg); box-shadow: 0 5px 0 0 var(--ink); }\n  .opt-card:active { transform: translateY(1px); box-shadow: 0 1px 0 0 var(--ink); }\n  .opt-card.checked {\n    background: var(--bg);\n    box-shadow: 0 3px 0 0 var(--ink), inset 0 0 0 3px var(--c);\n    transform: translateY(-1px);\n  }\n  .opt-card .icon {\n    font-size: 28px;\n    line-height: 1;\n    width: 48px; height: 48px;\n    border-radius: 14px;\n    background: var(--c);\n    border: 2px solid var(--ink);\n    color: white;\n    display: inline-flex; align-items: center; justify-content: center;\n    box-shadow: 0 2px 0 0 var(--ink);\n    margin-bottom: 4px;\n  }\n  .opt-card .name { font-weight: 700; font-size: 15px; color: var(--ink); }\n  .opt-card .sub  { font-size: 11px; color: var(--ink-soft); line-height: 1.3; }\n\n  /* ============== BIG PLAY BUTTON ============== */\n  .play-btn {\n    --btn-shadow-color: #d63838;\n    width: 100%;\n    border: 3px solid var(--ink);\n    background: linear-gradient(180deg, #FF8585 0%, var(--coral) 100%);\n    color: white;\n    font-family: \"Fredoka\", sans-serif;\n    font-weight: 700;\n    font-size: 22px;\n    letter-spacing: 0.5px;\n    padding: 18px 24px;\n    border-radius: 18px;\n    cursor: pointer;\n    box-shadow: 0 6px 0 0 var(--btn-shadow-color), 0 14px 24px -6px rgba(255, 107, 107, 0.55);\n    transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;\n    display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n    text-shadow: 0 2px 0 rgba(0,0,0,0.18);\n  }\n  .play-btn:hover:not(:disabled) {\n    transform: translateY(-2px);\n    box-shadow: 0 8px 0 0 var(--btn-shadow-color), 0 18px 30px -6px rgba(255, 107, 107, 0.6);\n  }\n  .play-btn:active:not(:disabled) {\n    transform: translateY(4px);\n    box-shadow: 0 2px 0 0 var(--btn-shadow-color), 0 6px 12px -4px rgba(255, 107, 107, 0.5);\n  }\n  .play-btn:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(0.3); }\n  .play-btn .spark { animation: wiggle 1.6s ease-in-out infinite; display: inline-block; }\n  @keyframes wiggle {\n    0%, 100% { transform: rotate(-8deg) scale(1); }\n    50%      { transform: rotate(12deg) scale(1.15); }\n  }\n\n  .secondary-btn {\n    background: white;\n    color: var(--ink);\n    border: 3px solid var(--ink);\n    border-radius: 16px;\n    padding: 14px 22px;\n    font-family: inherit;\n    font-weight: 700;\n    font-size: 16px;\n    cursor: pointer;\n    box-shadow: 0 4px 0 0 var(--ink);\n    transition: transform 0.1s, box-shadow 0.1s;\n  }\n  .secondary-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 0 var(--ink); background: var(--cloud); }\n  .secondary-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 0 var(--ink); }\n\n  .btn-row { display: flex; gap: 10px; margin-top: 14px; }\n  .btn-row > * { flex: 1; }\n\n  /* ============== QUIZ SCREEN ============== */\n  .quiz-hud {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 14px;\n    flex-wrap: wrap;\n  }\n  .chip-hud {\n    background: white;\n    border: 2.5px solid var(--ink);\n    border-radius: 999px;\n    padding: 6px 14px;\n    font-size: 14px;\n    font-weight: 700;\n    color: var(--ink);\n    box-shadow: 0 3px 0 0 var(--ink);\n    display: inline-flex; align-items: center; gap: 8px;\n  }\n  .chip-hud .label { color: var(--ink-soft); font-weight: 500; font-size: 12px; }\n  .chip-hud .v { color: var(--ink); }\n  .chip-streak { background: linear-gradient(180deg, #FFE9A8, var(--sunny)); }\n  .chip-score  { background: linear-gradient(180deg, #C3E5FF, #8EC8F8); }\n  .chip-hud .fire {\n    display: inline-block;\n    animation: flicker 0.9s ease-in-out infinite alternate;\n  }\n  @keyframes flicker {\n    0%   { transform: scale(1) rotate(-3deg); }\n    100% { transform: scale(1.18) rotate(5deg); }\n  }\n  .chip-streak.boom { animation: pop 0.35s ease; }\n  @keyframes pop {\n    0%   { transform: scale(1); }\n    40%  { transform: scale(1.18) rotate(-3deg); }\n    100% { transform: scale(1) rotate(0); }\n  }\n\n  .progress-track {\n    height: 14px;\n    background: var(--cloud);\n    border-radius: 999px;\n    border: 2.5px solid var(--ink);\n    overflow: hidden;\n    margin-bottom: 18px;\n    position: relative;\n    box-shadow: inset 0 2px 0 0 rgba(45,47,74,0.08);\n  }\n  .progress-fill {\n    height: 100%;\n    width: 0%;\n    background:\n      repeating-linear-gradient(45deg,\n        var(--sunny) 0 10px,\n        var(--coral) 10px 20px);\n    transition: width 0.5s cubic-bezier(.34,1.56,.64,1);\n    background-size: 28px 28px;\n    animation: stripeMove 1.2s linear infinite;\n  }\n  @keyframes stripeMove {\n    from { background-position: 0 0; }\n    to   { background-position: 28px 0; }\n  }\n\n  /* ============== POKEMON FRAME ============== */\n  .silhouette-frame {\n    background:\n      radial-gradient(ellipse at 50% 70%, rgba(77,171,247,0.18) 0%, transparent 60%),\n      radial-gradient(ellipse at 50% 30%, rgba(255,217,61,0.35) 0%, transparent 60%),\n      linear-gradient(180deg, #FFF7D6 0%, #DEF0FF 100%);\n    border-radius: var(--radius-s);\n    border: 3px solid var(--ink);\n    padding: 18px;\n    margin-bottom: 18px;\n    min-height: 300px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    position: relative;\n    overflow: hidden;\n    box-shadow: inset 0 4px 0 0 rgba(255,255,255,0.5);\n  }\n  /* Corner sparkles */\n  .silhouette-frame .corner-spark {\n    position: absolute;\n    width: 22px; height: 22px;\n    pointer-events: none;\n    animation: twinkle 2.6s ease-in-out infinite;\n  }\n  .silhouette-frame .corner-spark::before,\n  .silhouette-frame .corner-spark::after {\n    content: \"\"; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);\n    background: var(--sunny);\n    box-shadow: 0 0 0 2px var(--ink);\n  }\n  .silhouette-frame .corner-spark::before {\n    width: 22px; height: 6px; border-radius: 4px;\n  }\n  .silhouette-frame .corner-spark::after {\n    width: 6px; height: 22px; border-radius: 4px;\n  }\n  .silhouette-frame .corner-spark.c1 { top: 14px; left: 14px; animation-delay: 0s; }\n  .silhouette-frame .corner-spark.c2 { top: 22px; right: 18px; animation-delay: 0.5s; transform: scale(0.7); }\n  .silhouette-frame .corner-spark.c3 { bottom: 18px; left: 24px; animation-delay: 1s; transform: scale(0.7); }\n  .silhouette-frame .corner-spark.c4 { bottom: 14px; right: 16px; animation-delay: 1.4s; }\n  @keyframes twinkle {\n    0%, 100% { opacity: 0.4; transform: scale(0.7) rotate(0); }\n    50%      { opacity: 1;   transform: scale(1) rotate(40deg); }\n  }\n  /* Cute \"?\" mark behind the silhouette */\n  .silhouette-frame .qmark {\n    position: absolute;\n    font-family: \"Fredoka\", sans-serif;\n    font-weight: 700;\n    font-size: 220px;\n    color: rgba(45,47,74,0.06);\n    user-select: none;\n    pointer-events: none;\n    line-height: 0.8;\n  }\n\n  .pokemon-img {\n    width: clamp(180px, 50vw, 260px);\n    height: clamp(180px, 50vw, 260px);\n    object-fit: contain;\n    transition: filter 0.6s cubic-bezier(.34,1.56,.64,1), opacity 0.3s, transform 0.6s;\n    z-index: 1;\n    position: relative;\n    filter: drop-shadow(0 12px 12px rgba(0,0,0,0.18));\n  }\n  .pokemon-img.shadow {\n    filter: brightness(0) contrast(1) drop-shadow(0 12px 12px rgba(0,0,0,0.18));\n    animation: wobble 3.2s ease-in-out infinite;\n  }\n  .pokemon-img.revealed { filter: drop-shadow(0 12px 12px rgba(0,0,0,0.18)); animation: bigPop 0.6s cubic-bezier(.34,1.56,.64,1); }\n  .pokemon-img.loading { opacity: 0; }\n  @keyframes wobble {\n    0%, 100% { transform: rotate(-2deg) translateY(0); }\n    50%      { transform: rotate(2deg)  translateY(-6px); }\n  }\n  @keyframes bigPop {\n    0%   { transform: scale(0.6) rotate(-12deg); }\n    60%  { transform: scale(1.15) rotate(8deg); }\n    100% { transform: scale(1) rotate(0); }\n  }\n\n  .loader-mon {\n    position: absolute;\n    width: 60px; height: 60px;\n    border-radius: 50%;\n    background: conic-gradient(var(--coral), var(--sunny), var(--mint), var(--sky), var(--lilac), var(--coral));\n    border: 3px solid var(--ink);\n    animation: spin 1.1s linear infinite;\n  }\n  .loader-mon::before {\n    content: \"\"; position: absolute; inset: 8px;\n    border-radius: 50%;\n    background: white;\n    border: 2px solid var(--ink);\n  }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  /* ============== CHOICES ============== */\n  .choices {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));\n    gap: 10px;\n  }\n  .choice-btn {\n    --c: var(--sky);\n    background: white;\n    border: 3px solid var(--ink);\n    border-radius: 16px;\n    padding: 14px 12px;\n    font-family: \"Fredoka\", sans-serif;\n    font-size: 17px;\n    font-weight: 600;\n    cursor: pointer;\n    color: var(--ink);\n    box-shadow: 0 4px 0 0 var(--ink);\n    transition: transform 0.1s, box-shadow 0.1s, background 0.15s, border-color 0.15s;\n    text-align: center;\n    display: flex; align-items: center; justify-content: center; gap: 8px;\n    min-height: 56px;\n  }\n  .choice-btn .letter {\n    width: 26px; height: 26px;\n    flex: 0 0 auto;\n    background: var(--c);\n    color: white;\n    border: 2px solid var(--ink);\n    border-radius: 50%;\n    display: inline-flex; align-items: center; justify-content: center;\n    font-weight: 700;\n    font-size: 13px;\n    box-shadow: 0 2px 0 0 var(--ink);\n  }\n  .choice-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 0 0 var(--ink); background: var(--cloud); }\n  .choice-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 0 var(--ink); }\n  .choice-btn.correct {\n    background: linear-gradient(180deg, #B4F0BE, #6FE082);\n    border-color: var(--mint-d);\n    color: #14532D;\n    animation: jiggle 0.45s ease-in-out;\n  }\n  .choice-btn.correct .letter { background: var(--mint-d); }\n  .choice-btn.incorrect {\n    background: linear-gradient(180deg, #FFC8C8, #FF9E9E);\n    border-color: var(--coral-d);\n    color: #7F1D1D;\n    animation: shake 0.45s ease-in-out;\n  }\n  .choice-btn.incorrect .letter { background: var(--coral-d); }\n  .choice-btn:disabled { cursor: default; }\n  @keyframes jiggle {\n    0%, 100% { transform: scale(1); }\n    25%      { transform: scale(1.06) rotate(-2deg); }\n    75%      { transform: scale(1.06) rotate(2deg); }\n  }\n  @keyframes shake {\n    0%, 100% { transform: translateX(0); }\n    20%      { transform: translateX(-6px); }\n    40%      { transform: translateX(6px); }\n    60%      { transform: translateX(-4px); }\n    80%      { transform: translateX(4px); }\n  }\n\n  /* ============== FREE INPUT ============== */\n  .free-input {\n    display: flex;\n    gap: 8px;\n    margin-top: 4px;\n    flex-wrap: wrap;\n  }\n  .free-input input {\n    flex: 1;\n    min-width: 0;\n    padding: 14px 16px;\n    font-size: 17px;\n    font-family: inherit;\n    font-weight: 600;\n    border: 3px solid var(--ink);\n    border-radius: 14px;\n    outline: none;\n    background: white;\n    color: var(--ink);\n    box-shadow: inset 0 3px 0 0 rgba(45,47,74,0.06);\n  }\n  .free-input input::placeholder { color: var(--muted); font-weight: 500; }\n  .free-input input:focus { border-color: var(--sky); background: var(--cloud); }\n  .free-input input.correct { border-color: var(--mint-d); background: #DBFCE0; color: #14532D; animation: jiggle 0.45s; }\n  .free-input input.incorrect { border-color: var(--coral-d); background: #FFD8D8; color: #7F1D1D; animation: shake 0.45s; }\n  .free-input button {\n    background: var(--sky);\n    color: white;\n    border: 3px solid var(--ink);\n    border-radius: 14px;\n    padding: 0 20px;\n    font-family: inherit;\n    font-weight: 700;\n    font-size: 16px;\n    cursor: pointer;\n    box-shadow: 0 4px 0 0 var(--ink);\n    transition: transform 0.1s, box-shadow 0.1s;\n    min-height: 52px;\n  }\n  .free-input button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 0 0 var(--ink); }\n  .free-input button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 0 var(--ink); }\n  .free-input button:disabled { opacity: 0.6; cursor: not-allowed; }\n  .giveup-btn {\n    margin-top: 10px;\n    background: white;\n    color: var(--ink-soft);\n    border: 2.5px dashed var(--muted);\n    border-radius: 12px;\n    padding: 10px 16px;\n    font-family: inherit;\n    font-weight: 600;\n    font-size: 14px;\n    cursor: pointer;\n    width: 100%;\n    transition: transform 0.1s, background 0.15s, color 0.15s, border-color 0.15s;\n    display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  }\n  .giveup-btn:hover:not(:disabled) {\n    background: var(--cloud);\n    color: var(--ink);\n    border-color: var(--ink-soft);\n    transform: translateY(-1px);\n  }\n  .giveup-btn:active:not(:disabled) { transform: translateY(1px); }\n  .giveup-btn:disabled { opacity: 0.4; cursor: not-allowed; }\n  .giveup-btn .shrug { font-size: 16px; }\n\n  /* ============== FEEDBACK BUBBLE ============== */\n  .feedback {\n    margin-top: 16px;\n    padding: 14px 16px;\n    border-radius: 16px;\n    font-weight: 700;\n    text-align: center;\n    display: none;\n    border: 3px solid var(--ink);\n    box-shadow: 0 4px 0 0 var(--ink);\n    font-size: 17px;\n    position: relative;\n  }\n  .feedback.show {\n    display: block;\n    animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);\n  }\n  .feedback.correct { background: linear-gradient(180deg, #C7F4D0, #8FE3A1); color: #166534; }\n  .feedback.incorrect { background: linear-gradient(180deg, #FFD2D2, #FF9F9F); color: #991B1B; }\n  .feedback .big {\n    display: block;\n    font-size: 28px;\n    margin-bottom: 2px;\n    font-weight: 700;\n    letter-spacing: 1px;\n  }\n\n  /* ============== NEXT BUTTON ============== */\n  .next-btn {\n    --btn-shadow-color: #2cb547;\n    background: linear-gradient(180deg, #7FE695, var(--mint));\n    border: 3px solid var(--ink);\n    color: white;\n    font-family: inherit;\n    font-weight: 700;\n    font-size: 18px;\n    padding: 14px 20px;\n    border-radius: 16px;\n    cursor: pointer;\n    box-shadow: 0 5px 0 0 var(--btn-shadow-color);\n    transition: transform 0.1s, box-shadow 0.1s;\n    text-shadow: 0 2px 0 rgba(0,0,0,0.15);\n    display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n  }\n  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 0 var(--btn-shadow-color); }\n  .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 0 var(--btn-shadow-color); }\n  .next-btn .arrow { display: inline-block; transition: transform 0.2s; }\n  .next-btn:hover .arrow { transform: translateX(3px); }\n\n  /* ============== RESULTS ============== */\n  .results-hero {\n    text-align: center;\n    padding: 12px 0 20px;\n    position: relative;\n  }\n  .results-hero .score-big {\n    font-size: clamp(64px, 14vw, 96px);\n    font-weight: 700;\n    line-height: 1;\n    color: var(--ink);\n    text-shadow:\n      4px 4px 0 var(--sunny),\n      4px 4px 0 2px var(--ink);\n    letter-spacing: -2px;\n  }\n  .results-hero .score-big .slash { color: var(--muted); font-size: 0.5em; }\n  .results-hero .stars {\n    margin: 14px auto 8px;\n    display: inline-flex;\n    gap: 6px;\n  }\n  .results-hero .star {\n    width: 38px; height: 38px;\n    background: #E5E5E5;\n    border: 2.5px solid var(--ink);\n    clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);\n    transition: background 0.3s, transform 0.3s;\n  }\n  .results-hero .star.lit {\n    background: var(--sunny);\n    animation: starPop 0.5s cubic-bezier(.34,1.56,.64,1);\n  }\n  @keyframes starPop {\n    0%   { transform: scale(0) rotate(-180deg); }\n    100% { transform: scale(1) rotate(0); }\n  }\n  .results-hero .message {\n    margin-top: 14px;\n    font-size: 18px;\n    font-weight: 700;\n    color: var(--ink);\n  }\n  .results-hero .accuracy {\n    margin-top: 4px;\n    font-size: 14px;\n    color: var(--ink-soft);\n    font-weight: 500;\n  }\n\n  .review-header {\n    margin: 18px 0 10px;\n    font-size: 16px;\n    font-weight: 700;\n    color: var(--ink);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .review-header .pill {\n    background: var(--mint);\n    color: white;\n    border: 2px solid var(--ink);\n    border-radius: 999px;\n    padding: 2px 10px;\n    font-size: 12px;\n    box-shadow: 0 2px 0 0 var(--ink);\n  }\n\n  .answer-list {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));\n    gap: 10px;\n    max-height: 380px;\n    overflow-y: auto;\n    padding: 6px;\n    margin: 0 -6px;\n  }\n  .answer-card {\n    background: white;\n    border: 3px solid var(--ink);\n    border-radius: 14px;\n    padding: 8px 6px;\n    text-align: center;\n    font-size: 12px;\n    box-shadow: 0 3px 0 0 var(--ink);\n    position: relative;\n  }\n  .answer-card.correct { background: #E5FBEB; }\n  .answer-card.incorrect { background: #FFE9E9; }\n  .answer-card img {\n    width: 72px; height: 72px;\n    object-fit: contain;\n  }\n  .answer-card .pname { font-weight: 700; margin-top: 2px; color: var(--ink); font-size: 13px; }\n  .answer-card .your { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }\n  .answer-card .mark {\n    position: absolute;\n    top: -10px; right: -10px;\n    width: 28px; height: 28px;\n    border-radius: 50%;\n    border: 2.5px solid var(--ink);\n    background: var(--mint);\n    color: white;\n    font-weight: 700;\n    display: flex; align-items: center; justify-content: center;\n    box-shadow: 0 3px 0 0 var(--ink);\n    font-size: 14px;\n  }\n  .answer-card.incorrect .mark { background: var(--coral); }\n\n  .error {\n    background: #FFE3E3;\n    border: 3px solid var(--coral-d);\n    color: #991B1B;\n    padding: 12px 14px;\n    border-radius: 14px;\n    margin-bottom: 16px;\n    font-size: 14px;\n    font-weight: 600;\n    box-shadow: 0 3px 0 0 var(--coral-d);\n  }\n\n  /* ============== CONFETTI (DOM-based) ============== */\n  .confetti-piece {\n    position: fixed;\n    width: 12px;\n    height: 16px;\n    pointer-events: none;\n    z-index: 9999;\n    will-change: transform, opacity;\n  }\n\n  /* ============== MOBILE ============== */\n  @media (max-width: 640px) {\n    body { padding: 14px 12px 60px; }\n    .card { padding: 18px 14px; }\n    .wordmark { gap: 8px; }\n    .wordmark .badge { width: 44px; height: 44px; }\n    .wordmark h1 { font-size: 32px; }\n    .header .tagline { font-size: 14px; }\n    .option-grid.cols-3, .option-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }\n    .option-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }\n    .opt-card { min-height: 92px; padding: 10px 8px; }\n    .opt-card .icon { width: 40px; height: 40px; font-size: 22px; }\n    .opt-card .name { font-size: 14px; }\n    .opt-card .sub { font-size: 10.5px; }\n    .gen-grid { grid-template-columns: 1fr; }\n    .gen-card .sub { font-size: 11px; }\n    .choices { grid-template-columns: 1fr 1fr; }\n    .silhouette-frame { min-height: 240px; padding: 14px; }\n    .silhouette-frame .qmark { font-size: 160px; }\n    .quiz-hud { gap: 6px; }\n    .chip-hud { padding: 5px 10px; font-size: 12px; }\n    .chip-hud .label { font-size: 11px; }\n    .play-btn { font-size: 18px; padding: 16px 20px; }\n    .btn-row { flex-wrap: wrap; }\n    .free-input { gap: 6px; }\n    .free-input button { padding: 0 16px; min-height: 52px; }\n    .feedback { font-size: 15px; padding: 12px; }\n    .feedback .big { font-size: 22px; }\n    .answer-list { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }\n    .answer-card img { width: 60px; height: 60px; }\n  }\n  @media (max-width: 380px) {\n    .choices { grid-template-columns: 1fr; }\n  }\n\n  /* Reduced motion */\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after {\n      animation-duration: 0.001ms !important;\n      animation-iteration-count: 1 !important;\n      transition-duration: 0.001ms !important;\n    }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n  <div class=\"header\">\n    <div class=\"wordmark\">\n      <div class=\"badge\"><div class=\"dot\"><\u002Fdiv><\u002Fdiv>\n      <h1>Mystery&nbsp;Pokémon!<\u002Fh1>\n    <\u002Fdiv>\n    <p class=\"tagline\">Can <span class=\"pill\">you<\u002Fspan> guess them <span class=\"pill\">all?<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ============== SETUP SCREEN ============== -->\n  <div id=\"setup-screen\" class=\"screen active card\" data-screen-label=\"01 Setup\">\n    <div id=\"setup-error\" class=\"error\" style=\"display:none;\"><\u002Fdiv>\n\n    <div class=\"section\">\n      <h2><span class=\"num\">1<\u002Fspan> Choose your regions <span class=\"hint\">games &amp; shows<\u002Fspan><\u002Fh2>\n      <div class=\"gen-quick\">\n        <button class=\"pill-btn\" data-gen-action=\"all\">⭐ All regions<\u002Fbutton>\n        <button class=\"pill-btn\" data-gen-action=\"classic\">🎮 Classic (1-3)<\u002Fbutton>\n        <button class=\"pill-btn\" data-gen-action=\"none\">Clear<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"gen-grid\" class=\"gen-grid\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2><span class=\"num\">2<\u002Fspan> How tricky? <span class=\"hint\">pick a level<\u002Fspan><\u002Fh2>\n      <div id=\"difficulty-group\" class=\"option-grid cols-3\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2><span class=\"num\">3<\u002Fspan> How do they look? <span class=\"hint\">shadow or full color<\u002Fspan><\u002Fh2>\n      <div id=\"mode-group\" class=\"option-grid cols-2\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2><span class=\"num\">4<\u002Fspan> How do you answer? <span class=\"hint\">pick or type<\u002Fspan><\u002Fh2>\n      <div id=\"type-group\" class=\"option-grid cols-2\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2><span class=\"num\">5<\u002Fspan> How many rounds? <span class=\"hint\">no rush!<\u002Fspan><\u002Fh2>\n      <div id=\"count-group\" class=\"option-grid cols-4\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <button id=\"start-btn\" class=\"play-btn\">\n      <span class=\"spark\">✦<\u002Fspan>\n      Let's Play!\n      <span class=\"spark\">✦<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ============== QUIZ SCREEN ============== -->\n  <div id=\"quiz-screen\" class=\"screen card\" data-screen-label=\"02 Quiz\">\n    <div class=\"quiz-hud\">\n      <div class=\"chip-hud\">\n        <span class=\"label\">Round<\u002Fspan>\n        <span class=\"v\"><strong id=\"q-current\">1<\u002Fstrong><span id=\"q-total-wrap\"> of <strong id=\"q-total\">10<\u002Fstrong><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"chip-hud chip-streak\" id=\"streak-chip\">\n        <span class=\"fire\">🔥<\u002Fspan>\n        <span class=\"v\"><strong id=\"q-streak\">0<\u002Fstrong><\u002Fspan>\n        <span class=\"label\">streak<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"chip-hud chip-score\" style=\"margin-left:auto;\">\n        <span class=\"label\">Score<\u002Fspan>\n        <span class=\"v\"><strong id=\"q-score\">0<\u002Fstrong><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"progress-track\"><div id=\"progress-fill\" class=\"progress-fill\"><\u002Fdiv><\u002Fdiv>\n\n    <div class=\"silhouette-frame\">\n      <span class=\"qmark\">?<\u002Fspan>\n      <span class=\"corner-spark c1\"><\u002Fspan>\n      <span class=\"corner-spark c2\"><\u002Fspan>\n      <span class=\"corner-spark c3\"><\u002Fspan>\n      <span class=\"corner-spark c4\"><\u002Fspan>\n      <div id=\"loader\" class=\"loader-mon\"><\u002Fdiv>\n      <img id=\"pokemon-img\" class=\"pokemon-img loading\" alt=\"Mystery Pokémon\">\n    <\u002Fdiv>\n\n    <div id=\"answer-area\"><\u002Fdiv>\n\n    <div id=\"feedback\" class=\"feedback\"><\u002Fdiv>\n\n    <div class=\"btn-row\" id=\"quiz-controls\" style=\"margin-top: 16px;\">\n      <button id=\"next-btn\" class=\"next-btn\" style=\"display:none;\">Next <span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n      <button id=\"end-btn\" class=\"secondary-btn\">End Game<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============== RESULTS SCREEN ============== -->\n  <div id=\"results-screen\" class=\"screen card\" data-screen-label=\"03 Results\">\n    <div class=\"results-hero\">\n      <div class=\"score-big\"><span id=\"r-correct\">0<\u002Fspan><span class=\"slash\"> / <\u002Fspan><span id=\"r-total\">0<\u002Fspan><\u002Fdiv>\n      <div class=\"stars\" id=\"r-stars\">\n        <div class=\"star\"><\u002Fdiv>\n        <div class=\"star\"><\u002Fdiv>\n        <div class=\"star\"><\u002Fdiv>\n        <div class=\"star\"><\u002Fdiv>\n        <div class=\"star\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"message\" id=\"r-message\">Nice work!<\u002Fdiv>\n      <div class=\"accuracy\" id=\"r-accuracy\">0% correct<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"review-header\">\n      Your collection <span class=\"pill\" id=\"r-correct-pill\">0 caught<\u002Fspan>\n    <\u002Fdiv>\n    <div id=\"answer-list\" class=\"answer-list\"><\u002Fdiv>\n    <div class=\"btn-row\" style=\"margin-top: 22px;\">\n      <button id=\"play-again-btn\" class=\"play-btn\" style=\"font-size:18px; padding:14px 20px;\">\n        <span class=\"spark\">✦<\u002Fspan> Play Again <span class=\"spark\">✦<\u002Fspan>\n      <\u002Fbutton>\n      <button id=\"new-config-btn\" class=\"secondary-btn\">New Setup<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* =========================================================\n   Generation / Game data\n   ========================================================= */\nconst GENERATIONS = [\n  { id: 1, region: \"Kanto\",   range: [1, 151],    games: \"Red / Blue / Yellow\" },\n  { id: 2, region: \"Johto\",   range: [152, 251],  games: \"Gold / Silver / Crystal\" },\n  { id: 3, region: \"Hoenn\",   range: [252, 386],  games: \"Ruby / Sapphire / Emerald\" },\n  { id: 4, region: \"Sinnoh\",  range: [387, 493],  games: \"Diamond / Pearl / Platinum\" },\n  { id: 5, region: \"Unova\",   range: [494, 649],  games: \"Black / White\" },\n  { id: 6, region: \"Kalos\",   range: [650, 721],  games: \"X / Y\" },\n  { id: 7, region: \"Alola\",   range: [722, 809],  games: \"Sun / Moon\" },\n  { id: 8, region: \"Galar\",   range: [810, 905],  games: \"Sword / Shield\" },\n  { id: 9, region: \"Paldea\",  range: [906, 1025], games: \"Scarlet / Violet\" }\n];\n\nconst EASY_IDS = new Set([\n  1, 4, 7, 3, 6, 9, 25, 94, 130, 131, 133, 143, 149, 150, 151,\n  152, 155, 158, 154, 157, 160, 196, 197, 248, 249, 250,\n  252, 255, 258, 254, 257, 260, 282, 373, 376, 380, 381, 382, 383, 384,\n  387, 390, 393, 389, 392, 395, 445, 448, 470, 471, 483, 484, 487, 493,\n  495, 498, 501, 497, 500, 503, 643, 644, 646,\n  650, 653, 656, 652, 655, 658, 700, 716, 717,\n  722, 725, 728, 724, 727, 730, 778, 785, 791, 792,\n  810, 813, 816, 812, 815, 818, 887, 888, 889,\n  906, 909, 912, 908, 911, 914, 1007, 1008\n]);\n\nconst REGULAR_EXTRA_IDS = new Set([\n  2, 5, 8, 16, 18, 19, 23, 24, 26, 27, 28, 37, 38, 39, 40, 41, 42, 50, 52, 53, 54, 55, 56,\n  57, 58, 59, 63, 64, 65, 66, 67, 68, 74, 75, 76, 79, 80, 81, 82, 83, 86, 87, 90, 91, 92, 93,\n  95, 100, 101, 104, 105, 106, 107, 108, 109, 110, 113, 115, 122, 123, 124, 125, 126, 127, 128,\n  129, 132, 134, 135, 136, 137, 142, 144, 145, 146, 147, 148,\n  153, 156, 159, 161, 163, 169, 172, 173, 175, 176, 179, 180, 181, 183, 184, 185, 195, 200, 202,\n  208, 212, 214, 217, 220, 221, 225, 227, 233, 235, 239, 240, 242, 243, 244, 245, 247, 251,\n  253, 256, 259, 261, 262, 263, 264, 275, 277, 280, 281, 283, 284, 286, 287, 288, 289, 293, 294,\n  295, 296, 297, 302, 303, 304, 305, 306, 308, 309, 310, 319, 320, 321, 327, 330, 333, 334, 350,\n  353, 354, 357, 359, 360, 361, 362, 371, 372, 374, 375, 377, 378, 379, 385, 386,\n  391, 394, 396, 397, 398, 400, 403, 404, 405, 407, 415, 416, 417, 418, 419, 422, 423, 425, 426,\n  427, 428, 437, 442, 443, 444, 446, 447, 452, 454, 461, 466, 467, 469, 472, 475, 477, 479, 485,\n  486, 488, 491, 492,\n  496, 499, 502, 506, 509, 519, 522, 525, 526, 530, 531, 547, 552, 555, 569, 570, 571, 581, 587,\n  595, 596, 609, 612, 615, 621, 625, 628, 635, 636, 637, 638, 639, 640, 641, 642, 645, 647, 648, 649,\n  654, 657, 663, 666, 668, 671, 675, 681, 706, 709, 710, 711, 715, 718, 719, 720, 721,\n  723, 726, 729, 738, 745, 748, 754, 758, 760, 763, 764, 765, 768, 773, 775, 776, 777, 780, 784,\n  786, 787, 788, 793, 794, 795, 796, 797, 798, 799, 800, 801, 802, 807, 808, 809,\n  811, 814, 817, 819, 820, 823, 826, 833, 834, 845, 849, 855, 862, 863, 870, 871, 879, 884, 885,\n  886, 890, 892, 893, 894, 895, 896, 897, 898, 901, 902, 903, 904, 905,\n  907, 910, 913, 917, 920, 921, 923, 925, 935, 943, 946, 948, 950, 959, 962, 964, 966, 967, 971,\n  973, 976, 978, 979, 989, 990, 991, 994, 1000, 1001, 1002, 1003, 1004, 1005, 1006, 1009, 1010, 1017\n]);\n\nconst NAME_OVERRIDES = {\n  \"nidoran-f\": \"Nidoran♀\",\n  \"nidoran-m\": \"Nidoran♂\",\n  \"mr-mime\": \"Mr. Mime\",\n  \"mr-rime\": \"Mr. Rime\",\n  \"mime-jr\": \"Mime Jr.\",\n  \"farfetchd\": \"Farfetch'd\",\n  \"sirfetchd\": \"Sirfetch'd\",\n  \"ho-oh\": \"Ho-Oh\",\n  \"porygon-z\": \"Porygon-Z\",\n  \"type-null\": \"Type: Null\",\n  \"jangmo-o\": \"Jangmo-o\",\n  \"hakamo-o\": \"Hakamo-o\",\n  \"kommo-o\": \"Kommo-o\",\n  \"chien-pao\": \"Chien-Pao\",\n  \"ting-lu\": \"Ting-Lu\",\n  \"chi-yu\": \"Chi-Yu\",\n  \"wo-chien\": \"Wo-Chien\",\n  \"tapu-koko\": \"Tapu Koko\",\n  \"tapu-lele\": \"Tapu Lele\",\n  \"tapu-bulu\": \"Tapu Bulu\",\n  \"tapu-fini\": \"Tapu Fini\"\n};\n\nfunction prettifyName(apiName) {\n  if (NAME_OVERRIDES[apiName]) return NAME_OVERRIDES[apiName];\n  return apiName.split(\"-\")\n    .map(part => part.charAt(0).toUpperCase() + part.slice(1))\n    .join(\" \");\n}\n\n/* =========================================================\n   App state\n   ========================================================= */\nconst state = {\n  allPokemon: [],\n  config: {\n    gens: new Set([1]),\n    difficulty: \"regular\",\n    mode: \"shadow\",\n    quizType: \"multiple\",\n    count: 10\n  },\n  pool: [],\n  questions: [],\n  current: 0,\n  score: 0,\n  streak: 0,\n  bestStreak: 0,\n  answers: [],\n  awaitingNext: false\n};\n\n/* =========================================================\n   Utilities\n   ========================================================= */\nfunction shuffle(arr) {\n  const a = arr.slice();\n  for (let i = a.length - 1; i > 0; i--) {\n    const j = Math.floor(Math.random() * (i + 1));\n    [a[i], a[j]] = [a[j], a[i]];\n  }\n  return a;\n}\nfunction pickRandom(arr, n) { return shuffle(arr).slice(0, n); }\nfunction imageUrl(id) {\n  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;\n}\nfunction normalizeForCompare(s) {\n  return (s || \"\").toLowerCase()\n    .replace(/♀/g, \"f\").replace(/♂/g, \"m\")\n    .replace(/[^a-z0-9]/g, \"\");\n}\nfunction levenshtein(a, b) {\n  if (a === b) return 0;\n  if (!a.length) return b.length;\n  if (!b.length) return a.length;\n  const v0 = new Array(b.length + 1);\n  const v1 = new Array(b.length + 1);\n  for (let i = 0; i <= b.length; i++) v0[i] = i;\n  for (let i = 0; i < a.length; i++) {\n    v1[0] = i + 1;\n    for (let j = 0; j < b.length; j++) {\n      const cost = a[i] === b[j] ? 0 : 1;\n      v1[j + 1] = Math.min(v1[j] + 1, v0[j + 1] + 1, v0[j] + cost);\n    }\n    for (let j = 0; j <= b.length; j++) v0[j] = v1[j];\n  }\n  return v1[b.length];\n}\nfunction isFuzzyMatch(userInput, correctName) {\n  const u = normalizeForCompare(userInput);\n  const c = normalizeForCompare(correctName);\n  if (!u) return false;\n  if (u === c) return true;\n  const tol = c.length <= 5 ? 1 : c.length <= 9 ? 2 : 3;\n  return levenshtein(u, c) <= tol;\n}\n\n/* =========================================================\n   Confetti — DOM-based playful burst\n   ========================================================= */\nconst CONFETTI_COLORS = [\"#FF6B6B\", \"#FFD93D\", \"#4DABF7\", \"#51CF66\", \"#B197FC\", \"#FF87C3\", \"#FFB088\"];\nfunction burstConfetti(originX, originY, count = 28) {\n  if (window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches) return;\n  const pieces = [];\n  for (let i = 0; i < count; i++) {\n    const el = document.createElement(\"div\");\n    el.className = \"confetti-piece\";\n    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];\n    const shape = Math.random();\n    if (shape < 0.5) {\n      el.style.background = color;\n      el.style.borderRadius = \"2px\";\n    } else {\n      el.style.background = color;\n      el.style.borderRadius = \"50%\";\n      el.style.width = \"10px\";\n      el.style.height = \"10px\";\n    }\n    el.style.left = originX + \"px\";\n    el.style.top = originY + \"px\";\n    document.body.appendChild(el);\n    pieces.push(el);\n\n    const angle = (Math.random() * Math.PI) - Math.PI / 2 + (Math.random() - 0.5) * 0.8;\n    const speed = 360 + Math.random() * 320;\n    const vx = Math.cos(angle) * speed;\n    const vy = Math.sin(angle) * speed - 360;\n    const rotEnd = (Math.random() - 0.5) * 720;\n    const duration = 1100 + Math.random() * 700;\n\n    el.animate(\n      [\n        { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },\n        { transform: `translate(${vx * 0.6}px, ${vy * 0.6 + 200}px) rotate(${rotEnd * 0.6}deg)`, opacity: 1, offset: 0.6 },\n        { transform: `translate(${vx}px, ${vy + 700}px) rotate(${rotEnd}deg)`, opacity: 0 }\n      ],\n      { duration, easing: \"cubic-bezier(.25,.7,.4,1)\", fill: \"forwards\" }\n    ).onfinish = () => el.remove();\n  }\n}\n\n/* =========================================================\n   Load Pokémon data\n   ========================================================= */\nasync function loadAllPokemon() {\n  try {\n    const cached = localStorage.getItem(\"pkmn_list_v1\");\n    if (cached) {\n      const parsed = JSON.parse(cached);\n      if (Array.isArray(parsed) && parsed.length > 1000) {\n        state.allPokemon = parsed;\n        return;\n      }\n    }\n  } catch (_) {}\n  const res = await fetch(\"https://pokeapi.co/api/v2/pokemon?limit=1025\");\n  if (!res.ok) throw new Error(\"Failed to load Pokémon list\");\n  const data = await res.json();\n  const list = data.results.map((p, idx) => {\n    const id = idx + 1;\n    return { id, apiName: p.name, displayName: prettifyName(p.name) };\n  });\n  state.allPokemon = list;\n  try { localStorage.setItem(\"pkmn_list_v1\", JSON.stringify(list)); } catch (_) {}\n}\n\n/* =========================================================\n   Setup screen rendering\n   ========================================================= */\nfunction renderSetup() {\n  const genGrid = document.getElementById(\"gen-grid\");\n  genGrid.innerHTML = \"\";\n  GENERATIONS.forEach(gen => {\n    const checked = state.config.gens.has(gen.id);\n    const div = document.createElement(\"label\");\n    div.className = `gen-card gen-${gen.id}` + (checked ? \" checked\" : \"\");\n    div.innerHTML = `\n      <input type=\"checkbox\" data-gen=\"${gen.id}\" ${checked ? \"checked\" : \"\"}>\n      <div class=\"chip\">G${gen.id}<\u002Fdiv>\n      <div class=\"info\">\n        <div class=\"name\">${gen.region}<\u002Fdiv>\n        <div class=\"sub\">${gen.games}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tick\">✓<\u002Fdiv>\n    `;\n    div.querySelector(\"input\").addEventListener(\"change\", e => {\n      const g = Number(e.target.dataset.gen);\n      if (e.target.checked) state.config.gens.add(g);\n      else state.config.gens.delete(g);\n      div.classList.toggle(\"checked\", e.target.checked);\n    });\n    genGrid.appendChild(div);\n  });\n\n  document.querySelectorAll(\"[data-gen-action]\").forEach(btn => {\n    btn.addEventListener(\"click\", () => {\n      const action = btn.dataset.genAction;\n      if (action === \"all\") state.config.gens = new Set(GENERATIONS.map(g => g.id));\n      else if (action === \"none\") state.config.gens = new Set();\n      else if (action === \"classic\") state.config.gens = new Set([1, 2, 3]);\n      renderSetup();\n    });\n  });\n\n  renderOptionGroup(\"difficulty-group\", \"difficulty\", [\n    { value: \"easy\",    icon: \"🌱\", color: \"#51CF66\", bg: \"#DDF7E0\", name: \"Easy\",    sub: \"Most iconic only\" },\n    { value: \"regular\", icon: \"⭐\", color: \"#FFD93D\", bg: \"#FFF5CC\", name: \"Medium\",  sub: \"Iconic + favorites\" },\n    { value: \"hard\",    icon: \"🔥\", color: \"#FF6B6B\", bg: \"#FFE5E5\", name: \"Hard\",    sub: \"Anything goes!\" }\n  ]);\n  renderOptionGroup(\"mode-group\", \"mode\", [\n    { value: \"shadow\",  icon: \"👤\", color: \"#5C7CFA\", bg: \"#E1E7FE\", name: \"Shadow\",     sub: \"Silhouette only\" },\n    { value: \"picture\", icon: \"🎨\", color: \"#FF87C3\", bg: \"#FFE0EE\", name: \"Full Color\", sub: \"Easier mode\" }\n  ]);\n  renderOptionGroup(\"type-group\", \"quizType\", [\n    { value: \"multiple\", icon: \"🅰\", color: \"#4DABF7\", bg: \"#DDEEFC\", name: \"Pick One\",    sub: \"From 4 choices\" },\n    { value: \"free\",     icon: \"✏️\", color: \"#B197FC\", bg: \"#ECE3FF\", name: \"Type Name\",   sub: \"Typos OK\" }\n  ]);\n  renderOptionGroup(\"count-group\", \"count\", [\n    { value: 10,          icon: \"🎈\", color: \"#51CF66\", bg: \"#DDF7E0\", name: \"10\",   sub: \"Quick\" },\n    { value: 20,          icon: \"🎯\", color: \"#4DABF7\", bg: \"#DDEEFC\", name: \"20\",   sub: \"Normal\" },\n    { value: 30,          icon: \"🏆\", color: \"#FFD93D\", bg: \"#FFF5CC\", name: \"30\",   sub: \"Long\" },\n    { value: \"unlimited\", icon: \"∞\", color: \"#FF6B6B\", bg: \"#FFE5E5\", name: \"∞\",    sub: \"Forever!\" }\n  ]);\n}\n\nfunction renderOptionGroup(containerId, configKey, options) {\n  const container = document.getElementById(containerId);\n  container.innerHTML = \"\";\n  options.forEach(opt => {\n    const checked = state.config[configKey] === opt.value;\n    const label = document.createElement(\"label\");\n    label.className = \"opt-card\" + (checked ? \" checked\" : \"\");\n    label.style.setProperty(\"--c\", opt.color);\n    label.style.setProperty(\"--bg\", opt.bg);\n    label.innerHTML = `\n      <input type=\"radio\" name=\"${configKey}\" value=\"${opt.value}\" ${checked ? \"checked\" : \"\"}>\n      <div class=\"icon\">${opt.icon}<\u002Fdiv>\n      <div class=\"name\">${opt.name}<\u002Fdiv>\n      <div class=\"sub\">${opt.sub}<\u002Fdiv>\n    `;\n    label.querySelector(\"input\").addEventListener(\"change\", () => {\n      state.config[configKey] = opt.value;\n      renderOptionGroup(containerId, configKey, options);\n    });\n    container.appendChild(label);\n  });\n}\n\n/* =========================================================\n   Question pool\n   ========================================================= */\nfunction buildPool() {\n  if (state.config.gens.size === 0) {\n    throw new Error(\"Pick at least one region to play!\");\n  }\n  const inGens = state.allPokemon.filter(p => {\n    const gen = GENERATIONS.find(g => p.id >= g.range[0] && p.id <= g.range[1]);\n    return gen && state.config.gens.has(gen.id);\n  });\n  let pool;\n  if (state.config.difficulty === \"easy\")    pool = inGens.filter(p => EASY_IDS.has(p.id));\n  else if (state.config.difficulty === \"regular\") pool = inGens.filter(p => EASY_IDS.has(p.id) || REGULAR_EXTRA_IDS.has(p.id));\n  else pool = inGens;\n\n  if (pool.length < 4) throw new Error(\"Not enough Pokémon — try more regions or a harder level.\");\n  state.pool = pool;\n}\nfunction buildQuestions() {\n  const isUnlimited = state.config.count === \"unlimited\";\n  const n = isUnlimited ? state.pool.length : Math.min(Number(state.config.count), state.pool.length);\n  state.questions = pickRandom(state.pool, n);\n}\n\n/* =========================================================\n   Quiz flow\n   ========================================================= */\nfunction startQuiz() {\n  state.current = 0;\n  state.score = 0;\n  state.streak = 0;\n  state.bestStreak = 0;\n  state.answers = [];\n  state.awaitingNext = false;\n  document.getElementById(\"q-total\").textContent = state.questions.length;\n  document.getElementById(\"q-total-wrap\").style.display = state.config.count === \"unlimited\" ? \"none\" : \"\";\n  document.getElementById(\"q-streak\").textContent = \"0\";\n  switchScreen(\"quiz-screen\");\n  showQuestion();\n}\n\nfunction showQuestion() {\n  const q = state.questions[state.current];\n  if (!q) { endQuiz(); return; }\n  state.awaitingNext = false;\n\n  document.getElementById(\"q-current\").textContent = state.current + 1;\n  document.getElementById(\"q-score\").textContent = state.score;\n  document.getElementById(\"q-streak\").textContent = state.streak;\n\n  const pct = state.config.count === \"unlimited\"\n    ? Math.min(100, (state.current / 20) * 100)\n    : ((state.current) / state.questions.length) * 100;\n  document.getElementById(\"progress-fill\").style.width = pct + \"%\";\n\n  const img = document.getElementById(\"pokemon-img\");\n  const loader = document.getElementById(\"loader\");\n  loader.style.display = \"block\";\n  img.classList.add(\"loading\");\n  img.classList.remove(\"revealed\");\n  img.classList.toggle(\"shadow\", state.config.mode === \"shadow\");\n  img.src = imageUrl(q.id);\n  img.onload = () => {\n    loader.style.display = \"none\";\n    img.classList.remove(\"loading\");\n  };\n  img.onerror = () => {\n    loader.style.display = \"none\";\n    img.classList.remove(\"loading\");\n  };\n\n  document.getElementById(\"feedback\").className = \"feedback\";\n  document.getElementById(\"feedback\").innerHTML = \"\";\n  document.getElementById(\"next-btn\").style.display = \"none\";\n\n  if (state.config.quizType === \"multiple\") renderMultipleChoice(q);\n  else renderFreeInput(q);\n}\n\nfunction renderMultipleChoice(q) {\n  const area = document.getElementById(\"answer-area\");\n  const distractors = pickRandom(state.pool.filter(p => p.id !== q.id), 3);\n  const options = shuffle([q, ...distractors]);\n  const letters = [\"A\", \"B\", \"C\", \"D\"];\n  const colors = [\"#FF6B6B\", \"#FFD93D\", \"#4DABF7\", \"#51CF66\"];\n  area.innerHTML = `<div class=\"choices\">${options.map((o, i) =>\n    `<button class=\"choice-btn\" data-id=\"${o.id}\" style=\"--c:${colors[i]}\">\n       <span class=\"letter\">${letters[i]}<\u002Fspan>\n       <span>${o.displayName}<\u002Fspan>\n     <\u002Fbutton>`\n  ).join(\"\")}<\u002Fdiv>`;\n  area.querySelectorAll(\".choice-btn\").forEach(btn => {\n    btn.addEventListener(\"click\", () => handleChoice(btn, options, q));\n  });\n}\n\nfunction handleChoice(btn, options, q) {\n  if (state.awaitingNext) return;\n  const chosenId = Number(btn.dataset.id);\n  const isCorrect = chosenId === q.id;\n  document.querySelectorAll(\".choice-btn\").forEach(b => {\n    b.disabled = true;\n    const bid = Number(b.dataset.id);\n    if (bid === q.id) b.classList.add(\"correct\");\n    else if (bid === chosenId) b.classList.add(\"incorrect\");\n  });\n  finishQuestion(isCorrect, q, options.find(o => o.id === chosenId).displayName);\n}\n\nfunction renderFreeInput(q) {\n  const area = document.getElementById(\"answer-area\");\n  area.innerHTML = `\n    <div class=\"free-input\">\n      <input type=\"text\" id=\"free-answer\" placeholder=\"Type the name…\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" />\n      <button id=\"submit-answer\">Go!<\u002Fbutton>\n    <\u002Fdiv>\n    <button id=\"giveup-btn\" class=\"giveup-btn\" type=\"button\">\n      <span class=\"shrug\">🤔<\u002Fspan> I don't know — show me!\n    <\u002Fbutton>\n  `;\n  const input = document.getElementById(\"free-answer\");\n  const submit = document.getElementById(\"submit-answer\");\n  const giveup = document.getElementById(\"giveup-btn\");\n  setTimeout(() => input.focus({ preventScroll: true }), 50);\n  const doSubmit = () => {\n    if (state.awaitingNext) return;\n    const val = input.value.trim();\n    if (!val) return;\n    const isCorrect = isFuzzyMatch(val, q.displayName) || isFuzzyMatch(val, q.apiName);\n    input.disabled = true;\n    submit.disabled = true;\n    giveup.disabled = true;\n    input.classList.add(isCorrect ? \"correct\" : \"incorrect\");\n    finishQuestion(isCorrect, q, val);\n  };\n  const doGiveUp = () => {\n    if (state.awaitingNext) return;\n    input.disabled = true;\n    submit.disabled = true;\n    giveup.disabled = true;\n    input.classList.add(\"incorrect\");\n    finishQuestion(false, q, \"\");\n  };\n  submit.addEventListener(\"click\", doSubmit);\n  giveup.addEventListener(\"click\", doGiveUp);\n  input.addEventListener(\"keydown\", e => {\n    if (e.key === \"Enter\") {\n      if (state.awaitingNext) { goNext(); }\n      else doSubmit();\n    }\n  });\n}\n\nconst CORRECT_EXCLAIMS = [\"YES!\", \"NICE!\", \"BOOM!\", \"AWESOME!\", \"GREAT!\", \"WOO!\", \"SUPER!\"];\nconst WRONG_EXCLAIMS = [\"OOPS!\", \"SO CLOSE!\", \"AWW!\", \"ALMOST!\"];\n\nfunction finishQuestion(isCorrect, q, userAnswer) {\n  state.awaitingNext = true;\n  state.answers.push({ pokemon: q, correct: isCorrect, userAnswer });\n\n  if (isCorrect) {\n    state.score++;\n    state.streak++;\n    if (state.streak > state.bestStreak) state.bestStreak = state.streak;\n  } else {\n    state.streak = 0;\n  }\n\n  const streakEl = document.getElementById(\"q-streak\");\n  streakEl.textContent = state.streak;\n  const streakChip = document.getElementById(\"streak-chip\");\n  streakChip.classList.remove(\"boom\");\n  void streakChip.offsetWidth; // restart animation\n  if (isCorrect) streakChip.classList.add(\"boom\");\n\n  // Reveal silhouette\n  const img = document.getElementById(\"pokemon-img\");\n  img.classList.remove(\"shadow\");\n  img.classList.add(\"revealed\");\n\n  const fb = document.getElementById(\"feedback\");\n  const ex = isCorrect\n    ? CORRECT_EXCLAIMS[Math.floor(Math.random() * CORRECT_EXCLAIMS.length)]\n    : WRONG_EXCLAIMS[Math.floor(Math.random() * WRONG_EXCLAIMS.length)];\n\n  fb.className = \"feedback show \" + (isCorrect ? \"correct\" : \"incorrect\");\n  fb.innerHTML = isCorrect\n    ? `<span class=\"big\">${ex}<\u002Fspan>It's <strong>${q.displayName}<\u002Fstrong>!`\n    : `<span class=\"big\">${ex}<\u002Fspan>It was <strong>${q.displayName}<\u002Fstrong>.`;\n\n  document.getElementById(\"q-score\").textContent = state.score;\n\n  if (isCorrect) {\n    const frame = document.querySelector(\".silhouette-frame\");\n    if (frame) {\n      const r = frame.getBoundingClientRect();\n      burstConfetti(r.left + r.width / 2, r.top + r.height / 2, 36);\n    }\n  }\n\n  const nextBtn = document.getElementById(\"next-btn\");\n  const isLast = state.config.count !== \"unlimited\" && state.current >= state.questions.length - 1;\n  nextBtn.innerHTML = isLast ? `See Results <span class=\"arrow\">→<\u002Fspan>` : `Next <span class=\"arrow\">→<\u002Fspan>`;\n  nextBtn.style.display = \"\";\n  setTimeout(() => nextBtn.focus({ preventScroll: true }), 300);\n}\n\nfunction goNext() {\n  state.current++;\n  if (state.config.count === \"unlimited\" && state.current >= state.questions.length) {\n    state.questions = state.questions.concat(pickRandom(state.pool, state.pool.length));\n  }\n  if (state.config.count !== \"unlimited\" && state.current >= state.questions.length) {\n    endQuiz();\n    return;\n  }\n  showQuestion();\n}\n\nfunction endQuiz() {\n  switchScreen(\"results-screen\");\n  const total = state.answers.length;\n  const correct = state.score;\n  const acc = total === 0 ? 0 : Math.round((correct / total) * 100);\n  document.getElementById(\"r-correct\").textContent = correct;\n  document.getElementById(\"r-total\").textContent = total;\n  document.getElementById(\"r-accuracy\").textContent = `${acc}% correct`;\n  document.getElementById(\"r-correct-pill\").textContent = `${correct} caught`;\n\n  let starCount = 0;\n  if (acc >= 95) starCount = 5;\n  else if (acc >= 80) starCount = 4;\n  else if (acc >= 60) starCount = 3;\n  else if (acc >= 40) starCount = 2;\n  else if (acc >= 20) starCount = 1;\n\n  const stars = document.querySelectorAll(\"#r-stars .star\");\n  stars.forEach((s, i) => {\n    s.classList.remove(\"lit\");\n    if (i < starCount) {\n      setTimeout(() => s.classList.add(\"lit\"), 200 + i * 180);\n    }\n  });\n\n  let msg;\n  if (total === 0) msg = \"No rounds finished!\";\n  else if (acc === 100) msg = \"🏆 Perfect run!\";\n  else if (acc >= 90) msg = \"🌟 Amazing!\";\n  else if (acc >= 75) msg = \"🎉 Great job!\";\n  else if (acc >= 50) msg = \"👍 Nice effort!\";\n  else if (acc >= 25) msg = \"💪 Keep training!\";\n  else msg = \"🔄 Try again, you got this!\";\n  document.getElementById(\"r-message\").textContent = msg;\n\n  const list = document.getElementById(\"answer-list\");\n  list.innerHTML = state.answers.map(a => `\n    <div class=\"answer-card ${a.correct ? \"correct\" : \"incorrect\"}\">\n      <div class=\"mark\">${a.correct ? \"✓\" : \"✗\"}<\u002Fdiv>\n      <img src=\"${imageUrl(a.pokemon.id)}\" alt=\"${a.pokemon.displayName}\" loading=\"lazy\" />\n      <div class=\"pname\">${a.pokemon.displayName}<\u002Fdiv>\n      ${a.correct ? \"\" : `<div class=\"your\">You said: ${a.userAnswer || \"—\"}<\u002Fdiv>`}\n    <\u002Fdiv>\n  `).join(\"\");\n\n  // Confetti for great scores\n  if (starCount >= 4) {\n    setTimeout(() => {\n      const w = window.innerWidth;\n      burstConfetti(w * 0.25, 120, 30);\n      burstConfetti(w * 0.75, 120, 30);\n    }, 350);\n    if (starCount === 5) {\n      setTimeout(() => burstConfetti(window.innerWidth / 2, 100, 50), 900);\n    }\n  }\n}\n\n/* =========================================================\n   Screen management\n   ========================================================= */\nfunction switchScreen(id) {\n  document.querySelectorAll(\".screen\").forEach(s => s.classList.remove(\"active\"));\n  document.getElementById(id).classList.add(\"active\");\n  window.scrollTo({ top: 0, behavior: \"smooth\" });\n}\n\n/* =========================================================\n   Wire up\n   ========================================================= */\ndocument.getElementById(\"start-btn\").addEventListener(\"click\", async () => {\n  const errEl = document.getElementById(\"setup-error\");\n  errEl.style.display = \"none\";\n  const btn = document.getElementById(\"start-btn\");\n  try {\n    btn.disabled = true;\n    btn.innerHTML = `<span class=\"spark\">✦<\u002Fspan> Loading… <span class=\"spark\">✦<\u002Fspan>`;\n    if (!state.allPokemon.length) await loadAllPokemon();\n    buildPool();\n    buildQuestions();\n    startQuiz();\n  } catch (e) {\n    errEl.textContent = e.message || \"Something went wrong.\";\n    errEl.style.display = \"block\";\n  } finally {\n    btn.disabled = false;\n    btn.innerHTML = `<span class=\"spark\">✦<\u002Fspan> Let's Play! <span class=\"spark\">✦<\u002Fspan>`;\n  }\n});\n\ndocument.getElementById(\"next-btn\").addEventListener(\"click\", goNext);\ndocument.getElementById(\"end-btn\").addEventListener(\"click\", () => {\n  if (confirm(\"End the game now?\")) endQuiz();\n});\ndocument.getElementById(\"play-again-btn\").addEventListener(\"click\", () => {\n  buildQuestions();\n  startQuiz();\n});\ndocument.getElementById(\"new-config-btn\").addEventListener(\"click\", () => {\n  switchScreen(\"setup-screen\");\n});\n\n/* =========================================================\n   Init\n   ========================================================= */\nrenderSetup();\nloadAllPokemon().catch(() => {});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
